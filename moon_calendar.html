<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハワイアン・ムーン・カレンダー | 愛泉の杜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
  :root{
    --bg:#FBF6EC; --card:#FFF; --ink:#3A322A; --soft:#9A8F80;
    --line:#EAE1D2; --wax:#4F9D94; --full:#E2A23C; --wan:#8FAE7E;
    --fd:'Shippori Mincho','Yu Mincho',serif;
    --fb:'Zen Kaku Gothic New','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--fb);}

  /* 戻るリンク */
  .back-link{display:inline-block;font-size:.72rem;color:#CFC4AE;
    text-decoration:none;letter-spacing:.06em;margin-bottom:8px;opacity:.85;}
  .back-link:hover{opacity:1;color:#F7F1E4;}

  /* ヘッダー */
  .hdr{background:linear-gradient(180deg,#3E3A33,#4A4339);color:#F7F1E4;
    padding:18px 16px 20px;border-radius:0 0 20px 20px;}
  .hdr h1{font-family:var(--fd);font-size:1.2rem;font-weight:700;letter-spacing:.04em;margin-bottom:2px;}
  .hdr .sub{font-size:.7rem;color:#CFC4AE;letter-spacing:.08em;}



  /* ナビ */
  .nav{display:flex;align-items:center;gap:8px;margin:14px 12px 10px;}
  .nbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;}
  .nbtn:active{background:var(--line);}
  .ntitle{flex:1;text-align:center;font-family:var(--fd);font-weight:700;
    font-size:1.1rem;letter-spacing:.04em;}

  /* 年月ジャンプ */
  .jump-bar{display:flex;align-items:center;gap:8px;margin:-4px 12px 10px;justify-content:center;}
  .jump-bar select{font-family:var(--fb);font-size:.88rem;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px;
    background:var(--card);cursor:pointer;}
  .jump-bar button{font-family:var(--fd);font-weight:700;font-size:.85rem;
    color:#FBF6EC;background:var(--ink);border:none;border-radius:8px;
    padding:7px 14px;cursor:pointer;letter-spacing:.04em;}
  .jump-bar button:active{opacity:.85;}

  /* カレンダー枠 */
  .cal-wrap{margin:0 12px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;}

  /* 曜日行 */
  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);
    border-bottom:2px solid var(--line);}
  .dc{text-align:center;font-size:.68rem;font-weight:700;padding:8px 0;color:var(--soft);}
  .dc.s{color:#C25450;} .dc.sa{color:#4A6FA5;}

  /* グリッド */
  .grid{display:grid;grid-template-columns:repeat(7,1fr);}

  .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:4px 2px 5px;min-height:74px;
    display:flex;flex-direction:column;align-items:center;gap:1px;}
  .cell:nth-child(7n){border-right:none;}
  .cell.empty{background:rgba(0,0,0,.018);}
  .cell.today{background:#FFF7E2;}

  /* 夜グループ上線 */
  .cell[data-g="wax"]{border-top:2.5px solid var(--wax);}
  .cell[data-g="full"]{border-top:2.5px solid var(--full);}
  .cell[data-g="wan"]{border-top:2.5px solid var(--wan);}

  .dnum{font-family:var(--fd);font-weight:700;font-size:.9rem;line-height:1.3;
    width:100%;text-align:center;}
  .dnum.s{color:#C25450;} .dnum.sa{color:#4A6FA5;}
  .dicon{font-size:1.4rem;line-height:1;}
  .dnight{font-size:.58rem;color:var(--soft);font-weight:700;}
  .dname{font-size:.54rem;color:var(--soft);text-align:center;
    white-space:nowrap;overflow:hidden;max-width:100%;}
  .dmark{font-size:.85rem;line-height:1;}

  /* 凡例 */
  .leg{display:flex;gap:12px;margin:10px 14px 6px;font-size:.67rem;
    color:var(--soft);flex-wrap:wrap;}
  .leg2{margin-top:4px;}
  .leg span{display:inline-flex;align-items:center;gap:5px;}
  .leg i{display:inline-block;width:10px;height:10px;border-radius:2px;}
  .lw{background:var(--wax);} .lf{background:var(--full);} .ln{background:var(--wan);}

  /* 印刷 */
  .pbtn{display:block;width:calc(100% - 24px);margin:14px 12px 0;
    font-family:var(--fd);font-weight:700;font-size:.9rem;letter-spacing:.05em;
    color:#FBF6EC;background:var(--ink);border:none;border-radius:12px;
    padding:13px;cursor:pointer;text-align:center;}
  .pbtn:active{opacity:.85;}
  .phint{text-align:center;font-size:.67rem;color:var(--soft);margin:6px 0 24px;}
  @media print{
    .hdr{background:none;color:var(--ink);border-radius:0;}
    .nav,.leg,.pbtn,.phint{display:none;}
    .cal-wrap{border:none;border-radius:0;margin:0;}
  }
</style>
</head>
<body>
<header class="hdr">
  <a href="https://aisennomori.github.io/aisennomori-/moon_tools.html" class="back-link">← 月読みツール集へ戻る</a>
  <h1>🌙 ハワイアン・ムーン・カレンダー</h1>
  <p class="sub">愛泉の杜 ─ Spirit Tools</p>

</header>

<div class="nav">
  <button class="nbtn" id="prevBtn">←</button>
  <div class="ntitle" id="navTitle">─</div>
  <button class="nbtn" id="nextBtn">→</button>
</div>
<div class="jump-bar">
  <select id="jumpYear"></select>
  <select id="jumpMonth">
    <option value="1">1月</option><option value="2">2月</option>
    <option value="3">3月</option><option value="4">4月</option>
    <option value="5">5月</option><option value="6">6月</option>
    <option value="7">7月</option><option value="8">8月</option>
    <option value="9">9月</option><option value="10">10月</option>
    <option value="11">11月</option><option value="12">12月</option>
  </select>
  <button id="jumpBtn">表示</button>
</div>

<div class="cal-wrap">
  <div class="dow-row">
    <div class="dc s">日</div>
    <div class="dc">月</div><div class="dc">火</div>
    <div class="dc">水</div><div class="dc">木</div>
    <div class="dc">金</div>
    <div class="dc sa">土</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="leg">
  <span><i class="lw"></i>Ho'onui 満ちる（1〜10）</span>
  <span><i class="lf"></i>Poepoe 満月期（11〜20）</span>
  <span><i class="ln"></i>Ho'emi 欠ける（21〜30）</span>
</div>
<div class="leg leg2">
  <span>🔵 新しい事を始める</span>
  <span>❤️ 休息期</span>
  <span>🟢 食物パワー</span>
  <span>🩵 浄化期</span>
</div>

<button class="pbtn" id="pBtn">📄 PDFとして印刷</button>
<p class="phint">印刷ダイアログで「PDFに保存」を選ぶとPDF化できます</p>

<script>
const MD=[null,
  {n:1, name:'Hilo',         kana:'ヒロ',          icon:'🌑',g:'wax'},
  {n:2, name:'Hoaka',        kana:'ホアカ',         icon:'🌒',g:'wax'},
  {n:3, name:'Ku-kahi',      kana:'クーカヒ',       icon:'🌒',g:'wax'},
  {n:4, name:'Ku-lua',       kana:'クールア',        icon:'🌒',g:'wax'},
  {n:5, name:'Ku-kolu',      kana:'クーコル',        icon:'🌓',g:'wax'},
  {n:6, name:'Ku-pau',       kana:'クーパウ',        icon:'🌓',g:'wax'},
  {n:7, name:'Ole-ku-kahi',  kana:'オレクーカヒ',    icon:'🌔',g:'wax'},
  {n:8, name:'Ole-ku-lua',   kana:'オレクールア',    icon:'🌔',g:'wax'},
  {n:9, name:'Ole-ku-kolu',  kana:'オレクーコル',    icon:'🌔',g:'wax'},
  {n:10,name:'Ole-pau',      kana:'オレパウ',        icon:'🌔',g:'wax'},
  {n:11,name:'Huna',         kana:'フナ',           icon:'🌔',g:'full'},
  {n:12,name:'Mohalu',       kana:'モーハル',        icon:'🌕',g:'full'},
  {n:13,name:'Hua',          kana:'ファア',          icon:'🌕',g:'full'},
  {n:14,name:'Akua',         kana:'アクア',          icon:'🌕',g:'full'},
  {n:15,name:'Hoku',         kana:'ホク',           icon:'🌕',g:'full'},
  {n:16,name:'Mahealani',    kana:'マヘアラニ',      icon:'🌕',g:'full'},
  {n:17,name:'Kulu',         kana:'クル',           icon:'🌖',g:'full'},
  {n:18,name:'Laau-ku-kahi', kana:'ラーアウクーカヒ',icon:'🌖',g:'full'},
  {n:19,name:'Laau-ku-lua',  kana:'ラーアウクールア',icon:'🌗',g:'full'},
  {n:20,name:'Laau-pau',     kana:'ラーアウパウ',    icon:'🌗',g:'full'},
  {n:21,name:'Ole-ku-kahi',  kana:'オレクーカヒ',    icon:'🌗',g:'wan'},
  {n:22,name:'Ole-ku-lua',   kana:'オレクールア',    icon:'🌗',g:'wan'},
  {n:23,name:'Ole-pau',      kana:'オレパウ',        icon:'🌘',g:'wan'},
  {n:24,name:'Kaloa-ku-kahi',kana:'カーロアクーカヒ',icon:'🌘',g:'wan'},
  {n:25,name:'Kaloa-ku-lua', kana:'カーロアクールア',icon:'🌘',g:'wan'},
  {n:26,name:'Kaloa-pau',    kana:'カーロアパウ',    icon:'🌘',g:'wan'},
  {n:27,name:'Kane',         kana:'カーネ',          icon:'🌘',g:'wan'},
  {n:28,name:'Lono',         kana:'ロノ',           icon:'🌑',g:'wan'},
  {n:29,name:'Mauli',        kana:'マウリ',          icon:'🌑',g:'wan'},
  {n:30,name:'Muku',         kana:'ムク',           icon:'🌑',g:'wan'},
];

// ── 天文計算 ─────────────────────────────────────────────────
const D=86400000;
function newMoonJDE(k){
  const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
  const r=Math.PI/180,E=1-0.002516*T-0.0000074*T2;
  const Mm=((201.5643+385.81693528*k+0.0107582*T2+0.00001238*T3-0.000000058*T4)%360)*r;
  const Ms=((2.5534+29.10535670*k-0.0000014*T2-0.00000011*T3)%360)*r;
  const Fm=((160.7108+390.67050284*k-0.0016118*T2-0.00000227*T3)%360)*r;
  const Og=((124.7746-1.56375588*k+0.0020672*T2+0.00000215*T3)%360)*r;
  const s=Math.sin,E2=E*E;
  return 2451550.09766+29.530588861*k+0.00015437*T2-0.000000150*T3+0.00000000073*T4
    -0.40720*s(Mm)+0.17241*E*s(Ms)+0.01608*s(2*Mm)+0.01039*s(2*Fm)
    +0.00739*E*s(Mm-Ms)-0.00514*E*s(Mm+Ms)+0.00208*E2*s(2*Ms)
    -0.00111*s(Mm-2*Fm)-0.00057*s(Mm+2*Fm)+0.00056*E*s(2*Mm+Ms)
    -0.00042*s(3*Mm)+0.00042*E*s(Ms+2*Fm)+0.00038*E*s(Ms-2*Fm)
    -0.00024*E*s(2*Mm-Ms)-0.00017*s(Og)-0.00007*s(Mm+2*Ms)
    +0.00004*s(2*Mm-2*Fm)+0.00004*s(3*Ms)+0.00003*s(Mm+Ms-2*Fm)
    +0.00003*s(2*Mm+2*Fm)-0.00003*s(Mm+Ms+2*Fm)+0.00003*s(Mm-Ms+2*Fm)
    -0.00002*s(Mm-Ms-2*Fm)-0.00002*s(3*Mm+Ms)+0.00002*s(4*Mm);
}
function kFor(y,m){return Math.floor((y+(m-0.5)/12-2000)*12.3685);}
const nmCache={};
function getNM(y){
  if(nmCache[y]) return nmCache[y];
  const seen=new Set(),list=[];
  for(let k=kFor(y,1)-4;k<=kFor(y,12)+4;k++){
    const jst=new Date((newMoonJDE(k)-2440587.5)*D+9*3600*1000);
    const ms=Date.UTC(jst.getUTCFullYear(),jst.getUTCMonth(),jst.getUTCDate());
    if(!seen.has(ms)){seen.add(ms);list.push({ms,jstHour:jst.getUTCHours()});}
  }
  return nmCache[y]=list.sort((a,b)=>a.ms-b.ms);
}
function nmNear(y){return getNM(y-1).concat(getNM(y),getNM(y+1));}
function getHiloMs(nm){return nm.jstHour<6?nm.ms:nm.ms+D;}

function getMoonNight(year,month,day){
  const target=Date.UTC(year,month-1,day);
  const list=nmNear(year);
  let nmIdx=-1;
  for(let i=0;i<list.length;i++){if(list[i].ms<=target)nmIdx=i;else break;}
  if(nmIdx<0||nmIdx>=list.length-1) return null;
  const nm=list[nmIdx],nextNm=list[nmIdx+1];
  const hiloMs=getHiloMs(nm),nextHiloMs=getHiloMs(nextNm);
  const hasMauli=Math.round((nextHiloMs-hiloMs)/D)===30;
  if(target<hiloMs){
    const diff=Math.round((hiloMs-target)/D);
    if(diff===1) return 30;
    if(diff===2&&hasMauli) return 29;
    return null;
  }
  let offset=Math.round((target-hiloMs)/D);
  if(!hasMauli&&offset>=28) offset++;
  const n=offset+1;
  return(n>=1&&n<=30)?n:null;
}


// マーカー（moon_techoと同じ）
function markerForN(n){
  if(n>=1&&n<=3)  return'🔵';
  if(n>=7&&n<=10) return'❤️';
  if(n>=18&&n<=20)return'🟢';
  if(n>=23&&n<=26)return'🩵';
  return'';
}
// ── 状態 ─────────────────────────────────────────────────────
let cY,cM;

// ── 年月セレクト初期化 ──────────────────────────────────────
(function(){
  const sel=document.getElementById('jumpYear');
  const now=new Date();
  const cy=now.getFullYear();
  for(let y=1930;y<=cy+10;y++){
    const o=document.createElement('option');
    o.value=y; o.textContent=y+'年';
    if(y===cy) o.selected=true;
    sel.appendChild(o);
  }
  document.getElementById('jumpMonth').value=now.getMonth()+1;
})();

// ── カレンダー描画 ───────────────────────────────────────────
function render(year,month){
  cY=year; cM=month;
  document.getElementById('navTitle').textContent=`${year}年 ${month}月`;

  const now=new Date();
  const todayMs=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  const firstDow=new Date(year,month-1,1).getDay();
  const dim=new Date(year,month,0).getDate();
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  // 前月空白
  for(let i=0;i<firstDow;i++){
    const c=document.createElement('div');
    c.className='cell empty';
    grid.appendChild(c);
  }

  // 各日
  for(let d=1;d<=dim;d++){
    const ms=Date.UTC(year,month-1,d);
    const dow=new Date(year,month-1,d).getDay();
    const isToday=(ms===todayMs);
    const n=getMoonNight(year,month,d);
    const md=n?MD[n]:null;

    const c=document.createElement('div');
    c.className='cell'+(isToday?' today':'');
    if(md) c.dataset.g=md.g;

    // 日付
    const dn=document.createElement('div');
    dn.className='dnum'+(dow===0?' s':dow===6?' sa':'');
    dn.textContent=d;
    c.appendChild(dn);

    if(md){
      // 月相アイコン
      const ic=document.createElement('div');
      ic.className='dicon';
      ic.textContent=md.icon;
      c.appendChild(ic);
      // 夜番号
      const ni=document.createElement('div');
      ni.className='dnight';
      ni.textContent=`第${n}夜`;
      c.appendChild(ni);
      // 夜名
      const nm=document.createElement('div');
      nm.className='dname';
      nm.textContent=md.name;
      c.appendChild(nm);
      // マーカー
      const mk=markerForN(n);
      if(mk){
        const mel=document.createElement('div');
        mel.className='dmark';
        mel.textContent=mk;
        c.appendChild(mel);
      }
    }

    grid.appendChild(c);
  }

  // 末尾空白
  const total=firstDow+dim;
  const rem=total%7;
  if(rem>0){
    for(let i=0;i<7-rem;i++){
      const c=document.createElement('div');
      c.className='cell empty';
      grid.appendChild(c);
    }
  }
}

// ── イベント ─────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',()=>{
  let m=cM-1,y=cY;
  if(m<1){m=12;y--;}
  render(y,m);
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  let m=cM+1,y=cY;
  if(m>12){m=1;y++;}
  render(y,m);
});
document.getElementById('pBtn').addEventListener('click',()=>window.print());
document.getElementById('jumpBtn').addEventListener('click',()=>{
  const y=parseInt(document.getElementById('jumpYear').value);
  const m=parseInt(document.getElementById('jumpMonth').value);
  render(y,m);
});

// 初期表示
const _now=new Date();
render(_now.getFullYear(),_now.getMonth()+1);
</script>
</body>
</html>
