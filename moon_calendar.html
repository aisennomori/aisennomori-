<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハワイアン・ムーン・カレンダー | 愛泉の杜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root{
    --bg:#FBF6EC;
    --card:#FFFFFF;
    --ink:#3A322A;
    --ink-soft:#9A8F80;
    --line:#EAE1D2;
    --waxing:#4F9D94;
    --full:#E2A23C;
    --waning:#8FAE7E;
    --moon-dark:#2E2A24;
    --moon-light:#F6CE5B;
    --font-display:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
    --font-body:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
  }

  .page{
    max-width:480px;
    margin:0 auto;
    padding:0 0 40px;
    min-height:100vh;
  }

  header.app-header{
    background:linear-gradient(180deg,#3E3A33 0%,#4A4339 100%);
    color:#F7F1E4;
    padding:22px 20px 26px;
    border-radius:0 0 22px 22px;
  }
  header.app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.35rem;
    letter-spacing:.04em;
    margin:0 0 2px;
  }
  header.app-header .subtitle{
    font-size:.75rem;
    color:#CFC4AE;
    letter-spacing:.08em;
    margin:0;
  }

  .today-widget{
    margin-top:16px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    padding:12px 14px;
    display:grid;
    grid-template-columns:48px 1fr;
    gap:12px;
    align-items:center;
  }
  .today-widget .label{
    font-size:.68rem;
    color:#CFC4AE;
    letter-spacing:.1em;
    margin-bottom:2px;
  }
  .today-widget .name-line{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    color:#FBF6EC;
  }
  .today-widget .name-line .kana{
    font-weight:400;
    font-size:.78rem;
    color:#D8CDB8;
    margin-left:6px;
  }
  .today-widget .moon-wrap svg{ display:block; }

  .controls{
    margin:18px 16px 4px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .controls .field{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .controls label{
    font-size:.7rem;
    color:var(--ink-soft);
    letter-spacing:.06em;
  }
  .controls select{
    font-family:var(--font-body);
    font-size:.95rem;
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;
    padding:7px 10px;
    background:#FCFAF5;
  }
  .controls button{
    margin-left:auto;
    font-family:var(--font-display);
    font-weight:700;
    font-size:.9rem;
    color:#FBF6EC;
    background:var(--ink);
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    letter-spacing:.05em;
  }
  .controls button:active{ opacity:.85; }

  .cal-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    color:var(--ink);
    margin:22px 16px 8px;
    padding-bottom:6px;
    border-bottom:2px solid var(--line);
  }
  .calendar-list{
    margin:0 16px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }

  .day-card{
    position:relative;
    display:grid;
    grid-template-columns:46px 38px 1fr;
    gap:0 12px;
    align-items:center;
    padding:9px 14px 9px 18px;
    border-bottom:1px solid var(--line);
  }
  .day-card:last-child{ border-bottom:none; }
  .day-card::before{
    content:'';
    position:absolute;
    left:0; top:0; bottom:0;
    width:4px;
    background:var(--phase-color);
  }
  .day-card.today{ background:#FFF7E2; }

  .date-block{ text-align:center; }
  .date-num{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.3rem;
    line-height:1;
    color:var(--ink);
  }
  .date-dow{
    font-size:.66rem;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .date-dow.sun{ color:#C25450; }
  .date-dow.sat{ color:#4A6FA5; }

  .moon-wrap{ display:flex; justify-content:center; }

  .info-block{ min-width:0; }
  .info-block .name-line{
    font-family:var(--font-display);
    font-weight:700;
    font-size:.95rem;
    color:var(--ink);
  }
  .info-block .name-line .num{
    color:var(--ink-soft);
    font-weight:400;
    margin-right:3px;
  }
  .info-block .name-line .kana{
    font-weight:400;
    font-size:.76rem;
    color:var(--ink-soft);
    margin-left:6px;
  }

  .legend{
    display:flex;
    gap:14px;
    margin:14px 16px 0;
    font-size:.7rem;
    color:var(--ink-soft);
  }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend i{
    display:inline-block; width:10px; height:10px; border-radius:2px;
  }
  .legend .i-wax{ background:var(--waxing); }
  .legend .i-full{ background:var(--full); }
  .legend .i-wan{ background:var(--waning); }

  .month-block{ margin-bottom:6px; }

  .print-section{
    margin:22px 16px 0;
  }
  .print-section button{
    width:100%;
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    letter-spacing:.06em;
    color:#FBF6EC;
    background:var(--ink);
    border:none;
    border-radius:12px;
    padding:14px;
    cursor:pointer;
  }
  .print-section button:active{ opacity:.85; }
  .print-hint{
    text-align:center;
    font-size:.7rem;
    color:var(--ink-soft);
    margin-top:8px;
  }

  @media print{
    body{ background:#fff; }
    header.app-header{
      background:none; color:var(--ink); border-radius:0; padding:0 0 10px;
    }
    .today-widget{ display:none; }
    .controls{ display:none; }
    .legend{ display:none; }
    .print-section{ display:none; }
    .cal-title{ margin:10px 0 6px; }
    .month-block{ break-inside:avoid-page; }
    .calendar-list{ border:none; border-radius:0; margin:0; }
    .page{ max-width:100%; padding:0; }
    .day-card{ padding:5px 4px 5px 10px; break-inside:avoid; }
    .date-num{ font-size:1.05rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="app-header">
    <h1>ハワイアン・ムーン・カレンダー</h1>
    <p class="subtitle">愛泉の杜 ｰ ムーン手帖</p>

    <div class="today-widget">
      <div class="moon-wrap" id="todayMoon"></div>
      <div>
        <div class="label" id="todayLabel"></div>
        <div class="name-line" id="todayName"></div>
      </div>
    </div>
  </header>

  <section class="controls">
    <div class="field">
      <label for="yearInput">西暦年</label>
      <select id="yearInput" required></select>
    </div>
    <div class="field">
      <label for="monthInput">月</label>
      <select id="monthInput" required>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
    <button id="generateBtn" type="button">表示する</button>
  </section>

  <div class="legend">
    <span><i class="i-wax"></i>Ho'onui(満ちる)</span>
    <span><i class="i-full"></i>Poepoe(満月期)</span>
    <span><i class="i-wan"></i>Ho'emi(欠ける)</span>
  </div>

  <div id="monthsContainer"></div>

  <section class="print-section">
    <button id="printBtn" type="button">PDFとして印刷</button>
    <p class="print-hint">印刷ダイアログで「PDFに保存」を選ぶとPDF化できます</p>
  </section>

</div>

<script>
  const dowNames = ['日','月','火','水','木','金','土'];

  const moonData = [
    null,
    {n:1,  name:"Hilo",          kana:"ヒロ"},
    {n:2,  name:"Hoaka",         kana:"ホアカ"},
    {n:3,  name:"Kū-kahi",       kana:"クーカヒ"},
    {n:4,  name:"Kū-lua",        kana:"クールア"},
    {n:5,  name:"Kū-kolu",       kana:"クーコル"},
    {n:6,  name:"Kū-pau",        kana:"クーパウ"},
    {n:7,  name:"ʻOle-kū-kahi",  kana:"オレクーカヒ"},
    {n:8,  name:"ʻOle-kū-lua",   kana:"オレクールア"},
    {n:9,  name:"ʻOle-kū-kolu",  kana:"オレクーコル"},
    {n:10, name:"ʻOle-pau",      kana:"オレパウ"},
    {n:11, name:"Huna",          kana:"フナ"},
    {n:12, name:"Mōhalu",        kana:"モーハル"},
    {n:13, name:"Hua",           kana:"フア"},
    {n:14, name:"Akua",          kana:"アクア"},
    {n:15, name:"Hoku",          kana:"ホク"},
    {n:16, name:"Māhealani",     kana:"マヘアラニ"},
    {n:17, name:"Kulu",          kana:"クル"},
    {n:18, name:"Lāʻau-kū-kahi", kana:"ラーアウクーカヒ"},
    {n:19, name:"Lāʻau-kū-lua",  kana:"ラーアウクールア"},
    {n:20, name:"Lāʻau-kū-kolu", kana:"ラーアウクーコル"},
    {n:21, name:"ʻOle-kū-kahi",  kana:"オレクーカヒ"},
    {n:22, name:"ʻOle-kū-lua",   kana:"オレクールア"},
    {n:23, name:"ʻOle-pau",      kana:"オレパウ"},
    {n:24, name:"Kāloa-kū-kahi", kana:"カーロアクーカヒ"},
    {n:25, name:"Kāloa-kū-lua",  kana:"カーロアクールア"},
    {n:26, name:"Kāloa-pau",     kana:"カーロアパウ"},
    {n:27, name:"Kāne",          kana:"カーネ"},
    {n:28, name:"Lono",          kana:"ロノ"},
    {n:29, name:"Mauli",         kana:"マウリ"},
    {n:30, name:"Muku",          kana:"ムク"},
  ];

  let iconUid = 0;

    // ── 天文計算（Meeus）─────────────────────────────────────────
  function newMoonJDE(k){
    const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
    const r=Math.PI/180,E=1-0.002516*T-0.0000074*T2;
    const Mm=((201.5643+385.81693528*k+0.0107582*T2+0.00001238*T3-0.000000058*T4)%360)*r;
    const Ms=((2.5534+29.10535670*k-0.0000014*T2-0.00000011*T3)%360)*r;
    const Fm=((160.7108+390.67050284*k-0.0016118*T2-0.00000227*T3)%360)*r;
    const Og=((124.7746-1.56375588*k+0.0020672*T2+0.00000215*T3)%360)*r;
    const s=Math.sin,E2=E*E;
    return 2451550.09766+29.530588861*k+0.00015437*T2-0.000000150*T3+0.00000000073*T4
      -0.40720*s(Mm)+0.17241*E*s(Ms)+0.01608*s(2*Mm)+0.01039*s(2*Fm)
      +0.00739*E*s(Mm-Ms)-0.00514*E*s(Mm+Ms)+0.00208*E2*s(2*Ms)
      -0.00111*s(Mm-2*Fm)-0.00057*s(Mm+2*Fm)+0.00056*E*s(2*Mm+Ms)
      -0.00042*s(3*Mm)+0.00042*E*s(Ms+2*Fm)+0.00038*E*s(Ms-2*Fm)
      -0.00024*E*s(2*Mm-Ms)-0.00017*s(Og)-0.00007*s(Mm+2*Ms)
      +0.00004*s(2*Mm-2*Fm)+0.00004*s(3*Ms)+0.00003*s(Mm+Ms-2*Fm)
      +0.00003*s(2*Mm+2*Fm)-0.00003*s(Mm+Ms+2*Fm)+0.00003*s(Mm-Ms+2*Fm)
      -0.00002*s(Mm-Ms-2*Fm)-0.00002*s(3*Mm+Ms)+0.00002*s(4*Mm);
  }
  const D=86400000;
  function kFor(y,m){return Math.floor((y+(m-0.5)/12-2000)*12.3685);}

  // ── 新月リスト（JST日付＋時刻） ──────────────────────────────
  const nmCache={};
  function getNM(y){
    if(nmCache[y]) return nmCache[y];
    const seen=new Set(),list=[];
    for(let k=kFor(y,1)-4;k<=kFor(y,12)+4;k++){
      const jst=new Date((newMoonJDE(k)-2440587.5)*D+9*3600*1000);
      const ms=Date.UTC(jst.getUTCFullYear(),jst.getUTCMonth(),jst.getUTCDate());
      if(!seen.has(ms)){seen.add(ms);list.push({ms,jstHour:jst.getUTCHours()});}
    }
    return nmCache[y]=list.sort((a,b)=>a.ms-b.ms);
  }
  function nmNear(y){return getNM(y-1).concat(getNM(y),getNM(y+1));}

  // ── ハワイアンムーン コアロジック ────────────────────────────
  // Hilo = 新月JST時刻が06:00前→当日、以降→翌日
  function getHiloMs(nm){return nm.jstHour<6 ? nm.ms : nm.ms+D;}

  // 指定年月を含むサイクルを返す
  function findCycle(y,m){
    const s=Date.UTC(y,m-1,1),list=nmNear(y);
    for(let i=0;i<list.length-1;i++){
      if(list[i].ms+D>=s) return{nm:list[i],nextNm:list[i+1]};
    }
    return null;
  }

  // 指定日の夜番号(1-30)を返す
  // Mauli有無はHilo間隔で判定、純粋カウント（逆算なし）
  function getMoonNight(year,month,day){
    const target=Date.UTC(year,month-1,day);
    const list=nmNear(year);
    let nmIdx=-1;
    for(let i=0;i<list.length;i++){if(list[i].ms<=target)nmIdx=i;else break;}
    if(nmIdx<0||nmIdx>=list.length-1) return null;
    const nm=list[nmIdx],nextNm=list[nmIdx+1];
    const hiloMs=getHiloMs(nm);
    const nextHiloMs=getHiloMs(nextNm);
    const hasMauli=Math.round((nextHiloMs-hiloMs)/D)===30;
    // Hiloより前の日はMuku(30)またはMauli(29)
    if(target<hiloMs){
      const diff=Math.round((hiloMs-target)/D);
      if(diff===1) return 30; // Muku
      if(diff===2&&hasMauli) return 29; // Mauli
      return null;
    }
    // Hilo以降は純粋カウント
    let offset=Math.round((target-hiloMs)/D);
    if(!hasMauli&&offset>=28) offset++; // 第29夜スキップ
    const n=offset+1;
    return(n>=1&&n<=30)?n:null;
  }


  
// getMoonNight互換ラッパー（moonIconSVG用にdayIdx/lunLenを提供）
function getMoonNightInfo(year, month, day){
  const n = getMoonNight(year, month, day) || 1;
  const target = Date.UTC(year, month-1, day);
  const list = nmNear(year);
  let nmIdx = -1;
  for(let i=0;i<list.length;i++){if(list[i].ms<=target)nmIdx=i;else break;}
  if(nmIdx<0||nmIdx>=list.length-1) return{n,dayIdx:n-1,lunLen:30};
  const nm=list[nmIdx],nextNm=list[nmIdx+1];
  const lunLen=Math.round((nextNm.ms-nm.ms)/D);
  const dayIdx=Math.round((target-nm.ms)/D);
  return{n,dayIdx,lunLen};
}
  function moonIconSVG(dayIdx, lunLen, size){
    size = size || 30;
    iconUid++;
    const r = size/2 - 1.5;
    const cx = size/2, cy = size/2;
    const theta = (dayIdx/lunLen) * 2 * Math.PI;
    const dx = r * (1 + Math.cos(theta));
    const dir = dayIdx < lunLen/2 ? 1 : -1;
    const lightCx = cx + dir*dx;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" aria-hidden="true">'
      + '<defs><clipPath id="mclip'+iconUid+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'"/></clipPath></defs>'
      + '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="var(--moon-dark)"/>'
      + '<circle cx="'+lightCx+'" cy="'+cy+'" r="'+r+'" fill="var(--moon-light)" clip-path="url(#mclip'+iconUid+')"/>'
      + '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>'
      + '</svg>';
  }

  function phaseColor(n){
    if (n <= 10) return 'var(--waxing)';
    if (n <= 20) return 'var(--full)';
    return 'var(--waning)';
  }

  function daysInMonth(year, month){
    return new Date(year, month, 0).getDate();
  }

  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTodayWidget(){
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
    const info2 = getMoonNightInfo(y, m, d);
    const info = moonData[info2.n];
    document.getElementById('todayMoon').innerHTML = moonIconSVG(info2.dayIdx, info2.lunLen, 44);
    document.getElementById('todayLabel').textContent =
      '今日 ' + y + '年' + m + '月' + d + '日(' + dowNames[now.getDay()] + ')';
    document.getElementById('todayName').innerHTML =
      '<span class="num">' + info.n + '.</span> ' + escapeHtml(info.name)
      + '<span class="kana">' + info.kana + '</span>';
  }

  function populateYearSelect(){
    const sel = document.getElementById('yearInput');
    const current = new Date().getFullYear();
    for (let y = current + 6; y >= 1930; y--){
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '年';
      if (y === current) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  function buildMonthBlock(year, month){
    const wrapper = document.createElement('div');
    wrapper.className = 'month-block';

    const title = document.createElement('h2');
    title.className = 'cal-title';
    title.textContent = year + '年 ' + month + '月のムーンカレンダー';
    wrapper.appendChild(title);

    const list = document.createElement('div');
    list.className = 'calendar-list';

    const dim = daysInMonth(year, month);
    const now = new Date();

    for (let d = 1; d <= dim; d++){
      const info2 = getMoonNightInfo(year, month, d);
      const info = moonData[info2.n];
      const dateObj = new Date(year, month-1, d);
      const dow = dowNames[dateObj.getDay()];
      const isToday = (now.getFullYear() === year && now.getMonth()+1 === month && now.getDate() === d);

      let dowClass = '';
      if (dow === '日') dowClass = 'sun';
      if (dow === '土') dowClass = 'sat';

      const card = document.createElement('div');
      card.className = 'day-card' + (isToday ? ' today' : '');
      card.style.setProperty('--phase-color', phaseColor(info.n));
      card.innerHTML =
        '<div class="date-block">'
          + '<div class="date-num">' + d + '</div>'
          + '<div class="date-dow ' + dowClass + '">' + dow + '</div>'
        + '</div>'
        + '<div class="moon-wrap">' + moonIconSVG(info2.dayIdx, info2.lunLen) + '</div>'
        + '<div class="info-block">'
          + '<div class="name-line"><span class="num">' + info.n + '.</span> '
            + escapeHtml(info.name) + '<span class="kana">' + info.kana + '</span></div>'
        + '</div>';
      list.appendChild(card);
    }

    wrapper.appendChild(list);
    return wrapper;
  }

  function render(){
    const year = parseInt(document.getElementById('yearInput').value, 10);
    const month = parseInt(document.getElementById('monthInput').value, 10);
    if (!year || !month) return;

    const container = document.getElementById('monthsContainer');
    container.innerHTML = '';

    let y2 = year, m2 = month + 1;
    if (m2 > 12) { m2 = 1; y2 += 1; }

    container.appendChild(buildMonthBlock(year, month));
    container.appendChild(buildMonthBlock(y2, m2));
  }

  document.getElementById('generateBtn').addEventListener('click', render);
  document.getElementById('printBtn').addEventListener('click', function(){ window.print(); });

  populateYearSelect();
  document.getElementById('monthInput').value = (new Date().getMonth()+1);
  renderTodayWidget();
  render();
</script>
</body>
</html>
